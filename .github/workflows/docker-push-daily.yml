name: nightly and on.push docker builds

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "the name of the tag for the docker image"
        type: "string"
        required: true

  push:
    branches:
      - main
    paths:
      - docker/**

  schedule:
    - cron: '0 0 * * *'

env:
  IMAGE: harbor.vaderrp.com/operinko-labs/bweso

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.vaderrp.com
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tags=${{ env.IMAGE }}:${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "latest")
            echo "tags=${{ env.IMAGE }}:nightly,${{ env.IMAGE }}:${LAST_TAG}" >> "$GITHUB_OUTPUT"
          else
            SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tags=${{ env.IMAGE }}:latest,${{ env.IMAGE }}:sha-${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker Build and Push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: docker
          platforms: |
            linux/amd64
            linux/arm64
          tags: ${{ steps.tag.outputs.tags }}
