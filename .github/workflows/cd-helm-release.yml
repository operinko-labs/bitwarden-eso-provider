name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Helm
        uses: azure/setup-helm@v3.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Harbor OCI
        run: |
          echo "${{ secrets.HARBOR_PASSWORD }}" | helm registry login harbor.vaderrp.com \
            --username "${{ secrets.HARBOR_USERNAME }}" \
            --password-stdin

      - name: Package and push chart
        run: |
          helm package charts/bitwarden-eso-provider
          CHART_PKG=$(ls bitwarden-eso-provider-*.tgz)
          helm push "$CHART_PKG" oci://harbor.vaderrp.com/operinko-labs
